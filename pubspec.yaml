name: cigarette_bug
description: "CigaretteBug — 菸蟲：吸菸記錄 + 3D 視覺化 App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Barcode scanner (temporarily disabled for simulator arm64 compatibility)
  # mobile_scanner: ^6.0.2

  # Sensors (accelerometer for gravity tilt)
  sensors_plus: ^6.1.1

  # Charts
  fl_chart: ^0.70.2

  # UUID
  uuid: ^4.5.1

  # Intl (date formatting)
  intl: ^0.20.2
  forge2d: ^0.14.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/brand_data.json
